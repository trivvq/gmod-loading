<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GMod Loading Screen</title>
    <style>
        /* Убираем скроллы */
        ::-webkit-scrollbar { display: none; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            
            /* Твоя картинка */
            background-image: url('bg.jpg'); 
            
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            cursor: default;
        }

        /* Легкое затемнение фона */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        /* КОНТЕЙНЕР СЛЕВА СВЕРХУ */
        .top-left-box {
            position: absolute;
            top: 50px;
            left: 60px; /* ТЕПЕРЬ СЛЕВА */
            z-index: 2;
            text-align: left; /* Текст выровнен по левому краю */
        }

        /* Название сервера */
        h1 {
            font-size: 3.5em;
            margin: 0;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        /* Название карты */
        h2 {
            font-size: 1.8em;
            color: #00A651; /* ХАРЬКОВСКИЙ ЗЕЛЕНЫЙ */
            font-weight: 600;
            margin: 5px 0 20px 0;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }

        /* Текущий статус */
        .status-text {
            font-size: 1.2em;
            color: #eeeeee;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            backdrop-filter: blur(5px);
            
            /* Зеленая линия теперь СЛЕВА */
            border-left: 4px solid #00A651; 
        }

    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="top-left-box">
        <h1 id="server-name">ЗАГРУЗКА...</h1>
        <h2 id="map-name">Ожидание данных...</h2>
        
        <div class="status-text" id="status-text">Подключение к серверу...</div>
    </div>

    <script>
        // === ЛОГИКА GMOD ===
        
        function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode ) {
            document.getElementById('server-name').innerText = servername;
            document.getElementById('map-name').innerText = mapname;
        }

        function SetStatusChanged( status ) {
            document.getElementById('status-text').innerText = status;
        }

        function DownloadingFile( fileName ) {
            document.getElementById('status-text').innerText = "Скачивание: " + fileName;
        }
        
        // Пустые функции, чтобы консоль не ругалась
        function SetFilesTotal( total ) {}
        function SetFilesNeeded( needed ) {}
    </script>
</body>
</html>
