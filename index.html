<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GMod Loading Screen</title>
    <style>
        /* ОСНОВНОЙ ФОН */
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Цвет на случай, если картинка не прогрузится */
            
            /* ВАЖНО: Замени 'bg.jpg' на точное название твоего файла с картинкой! */
            background-image: url('bg.jpg');
            
            background-size: cover;   /* Растягивает картинку на весь экран */
            background-position: center center; /* Центрирует картинку */
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Затемнение фона, чтобы текст лучше читался */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); /* Полупрозрачный черный слой */
            z-index: 1;
        }

        /* Контейнер для заголовков (слева сверху) */
        .top-left-content {
            position: absolute;
            top: 40px;
            left: 50px;
            z-index: 2;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8); /* Тень для текста */
        }

        h1 {
            font-size: 3.5em;
            margin: 0;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
        }

        h2 {
            font-size: 1.8em;
            color: #00A651; /* Харьковский зеленый для подзаголовка */
            font-weight: 400;
            margin-top: 10px;
        }

        /* Контейнер для загрузки (СНИЗУ СПРАВА) */
        .bottom-right-box {
            position: fixed;
            bottom: 30px;
            right: 40px;
            z-index: 2;
            width: 400px; /* Ширина блока загрузки */
            text-align: right;
            background: rgba(0, 0, 0, 0.6); /* Фон под блоком для читаемости */
            padding: 20px;
            border-radius: 12px;
            border-right: 4px solid #00A651; /* Зеленая полоска справа для стиля */
        }

        /* Сама полоса загрузки (Фон - белый) */
        .loader-box {
            width: 100%;
            height: 14px;
            background: #ffffff; /* БЕЛЫЙ ФОН */
            border-radius: 7px;
            overflow: hidden;
            position: relative;
            margin-top: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Прогресс бар (Цвет - Харьковский зеленый) */
        .loader-bar {
            height: 100%;
            background: #00A651; /* ХАРЬКОВСКИЙ ЗЕЛЕНЫЙ */
            width: 0%; /* Начинается с 0% */
            /* Анимация для примера, GMod сам будет ей управлять */
            transition: width 0.4s ease; 
             /* Убери строчку ниже, если хочешь, чтобы полоска двигалась только реально от GMod */
            animation: load-demo 8s ease-in-out infinite; 
        }
        
        /* Демо-анимация (можно убрать) */
         @keyframes load-demo {
            0% { width: 5%; }
            50% { width: 60%; }
            100% { width: 95%; }
        }

        .status-text {
            font-size: 1.1em;
            color: #ffffff;
            font-weight: 600;
        }
        
        .status-detail {
             font-size: 0.9em;
             color: #cccccc;
             margin-top: 5px;
        }

    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="top-left-content">
        <h1 id="server-name">Coop Metrsotroi</h1>
    </div>

    <div class="bottom-right-box">
        <div class="status-text">Подключение к серверу...</div>
        <div class="status-detail" id="status-detail">Инициализация...</div>
        
        <div class="loader-box">
            <div class="loader-bar" id="loadbar"></div>
        </div>
    </div>

    <script>
        // Скрипт для получения данных от GMod
        
        // Основная информация о сервере
        function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode ) {
            document.getElementById('server-name').innerText = servername || "Мой Сервер";
            document.getElementById('map-name').innerText = "Карта: " + (mapname || "Неизвестно");
        }
        
        // Изменение текста статуса (например, "Загрузка текстур...")
        function SetStatusChanged( status ) {
            document.getElementById('status-detail').innerText = status;
        }
        
        // Движение полоски загрузки (файлы)
        function DownloadingFile( fileName ) {
             document.getElementById('status-detail').innerText = "Скачивание: " + fileName;
        }
        
        // Движение полоски загрузки (общий прогресс)
        function SetFilesNeeded( needed ) {
             // Эта функция нужна для расчета процента, но в простой версии можно опустить
        }
        
        function SetFilesTotal( total ) {
            // Эта функция нужна для расчета процента
        }
        
        // GMod в новых версиях сам двигает полоску, если она правильно настроена,
        // но этот скрипт помогает обновлять текстовые статусы.
    </script>
</body>
</html>
