<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GMod Loading Screen</title>
    <style>
        /* УБИРАЕМ ПОЛОСЫ ПРОКРУТКИ БРАУЗЕРА */
        ::-webkit-scrollbar { 
            display: none; 
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            
            /* Твоя картинка */
            background-image: url('bg.jpg'); 
            
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Жестко скрываем всё, что вылезает за экран */
            position: relative;
            cursor: default; /* Обычный курсор */
        }

        /* Затемнение фона */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3); /* Легкое затемнение */
            z-index: 1;
        }

        /* Блок с названием сервера (СЛЕВА СВЕРХУ) */
        .server-info {
            position: absolute;
            top: 50px;
            left: 60px;
            z-index: 2;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
        }

        h1 {
            font-size: 4em;
            margin: 0;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 3px;
            color: #ffffff;
        }

        h2 {
            font-size: 2em;
            color: #00A651; /* ХАРЬКОВСКИЙ ЗЕЛЕНЫЙ */
            font-weight: 500;
            margin-top: 5px;
        }

        /* Твой кастомный статус-бар (СНИЗУ СПРАВА) */
        .status-container {
            position: fixed;
            bottom: 40px;
            right: 50px;
            z-index: 2;
            width: 450px;
            background: rgba(0, 0, 0, 0.7); /* Темная подложка */
            padding: 25px;
            border-radius: 15px;
            /* Зеленая линия справа для стиля */
            border-right: 5px solid #00A651; 
            backdrop-filter: blur(5px); /* Размытие фона под блоком (красиво!) */
        }

        .status-text {
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }

        .file-info {
            font-size: 0.9em;
            color: #bbbbbb;
            margin-bottom: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Если название файла длинное, ставим троеточие */
        }

        /* Оболочка полоски (БЕЛАЯ) */
        .progress-track {
            width: 100%;
            height: 12px;
            background: #ffffff;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }

        /* Сама зеленая полоска */
        .progress-bar {
            height: 100%;
            width: 0%; /* Изначально 0% */
            background-color: #00A651; /* ХАРЬКОВСКИЙ ЗЕЛЕНЫЙ */
            transition: width 0.3s ease-out; /* Плавное движение */
            box-shadow: 0 0 10px rgba(0, 166, 81, 0.5); /* Небольшое свечение */
        }

    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="server-info">
        <h1 id="server-name">ЗАГРУЗКА...</h1>
        <h2 id="map-name">Ожидание данных...</h2>
    </div>

    <div class="status-container">
        <div class="status-text" id="status-text">Подключение...</div>
        <div class="file-info" id="file-info">Получение информации о сервере...</div>
        
        <div class="progress-track">
            <div class="progress-bar" id="load-bar"></div>
        </div>
    </div>

    <script>
        // === ЛОГИКА GMOD ===
        // Эти функции вызываются самой игрой. Мы просто обновляем HTML.

        let filesTotal = 0;
        let filesNeeded = 0;

        // 1. Установка названия сервера и карты
        function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode ) {
            document.getElementById('server-name').innerText = servername;
            document.getElementById('map-name').innerText = mapname;
        }

        // 2. Изменение общего статуса (например "Sending Client Info")
        function SetStatusChanged( status ) {
            document.getElementById('status-text').innerText = status;
        }

        // 3. Скачивание конкретного файла
        function DownloadingFile( fileName ) {
            document.getElementById('file-info').innerText = "Скачивание: " + fileName;
        }

        // 4. Установка общего количества файлов
        function SetFilesTotal( total ) {
            filesTotal = total;
        }

        // 5. Сколько файлов осталось скачать
        function SetFilesNeeded( needed ) {
            filesNeeded = needed;
            UpdateProgress();
        }

        // Функция обновления зеленой полоски
        function UpdateProgress() {
            if (filesTotal > 0) {
                // Считаем процент: (Всего - Осталось) / Всего
                let progress = ((filesTotal - filesNeeded) / filesTotal) * 100;
                
                // Округляем и двигаем полоску
                document.getElementById('load-bar').style.width = progress + "%";
            }
        }
    </script>
</body>
</html>
