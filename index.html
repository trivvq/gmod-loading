<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GMod Loading Screen</title>
    <style>
        /* Скрываем скроллы */
        ::-webkit-scrollbar { display: none; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            
            /* Твоя картинка */
            background-image: url('bg.jpg'); 
            
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            
            /* Магия Flexbox для центровки */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            position: relative;
        }

        /* Затемнение фона (виньетка) */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР (ПО ЦЕНТРУ) */
        .center-box {
            z-index: 10;
            text-align: center;
            width: 600px;
            
            /* Стеклянный эффект */
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            
            /* Анимация появления */
            animation: fadeInUp 1s ease-out;
        }

        h1 {
            font-size: 3.5em;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 166, 81, 0.3);
        }

        h2 {
            font-size: 1.2em;
            color: #00A651; /* Зеленый */
            font-weight: 600;
            margin: 0 0 30px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Статус тексты */
        .status-text {
            font-size: 1.1em;
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }
        
        .file-info {
            font-size: 0.9em;
            color: #bbbbbb;
            margin-bottom: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        /* Полоса загрузки */
        .progress-track {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00A651, #00ff7b); /* Градиент Харьков */
            box-shadow: 0 0 15px #00A651;
            transition: width 0.3s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="center-box">
        <h1 id="server-name">ЗАГРУЗКА...</h1>
        <h2 id="map-name">Ожидание данных...</h2>

        <div class="status-text" id="status-text">Подключение...</div>
        <div class="file-info" id="file-info">Связь с сервером...</div>
        
        <div class="progress-track">
            <div class="progress-bar" id="load-bar"></div>
        </div>
    </div>

    <script>
        // Стандартная логика GMod
        let filesTotal = 0;
        let filesNeeded = 0;

        function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode ) {
            document.getElementById('server-name').innerText = servername || "GARRY'S MOD";
            document.getElementById('map-name').innerText = "MAP: " + (mapname || "Unknown");
        }

        function SetStatusChanged( status ) {
            document.getElementById('status-text').innerText = status;
        }

        function DownloadingFile( fileName ) {
            document.getElementById('file-info').innerText = fileName;
        }

        function SetFilesTotal( total ) {
            filesTotal = total;
        }

        function SetFilesNeeded( needed ) {
            filesNeeded = needed;
            UpdateProgress();
        }

        function UpdateProgress() {
            if (filesTotal > 0) {
                let progress = ((filesTotal - filesNeeded) / filesTotal) * 100;
                document.getElementById('load-bar').style.width = progress + "%";
            }
        }
    </script>
</body>
</html>
